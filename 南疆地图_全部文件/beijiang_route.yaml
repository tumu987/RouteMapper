segments:
  - day: 1
    type: rest
    city: 乌鲁木齐
    note: "抵达休整，逛大巴扎+博物馆"

  - day: 2
    from: 乌鲁木齐
    to: 富蕴
    distance_km: 472
    driving_hours: 5.5
    highway: "G7京新高速 → 五大高速"
    note: "可绕行天山天池(+1h)"

  - day: 3
    from: 富蕴
    to: 布尔津
    distance_km: 282
    driving_hours: 4
    highway: "S226 → G216 → S232"
    note: "上午游览可可托海，傍晚五彩滩日落"

  - day: 4
    from: 布尔津
    to: 喀纳斯
    distance_km: 149
    driving_hours: 3
    note: "盘山路，景区需换乘区间车"

  - day: 5
    from: 喀纳斯
    to: 禾木
    distance_km: 18
    driving_hours: 1
    note: "景区内道路，清晨神仙湾晨雾"

  - day: 6
    from: 禾木
    to: 乌尔禾
    distance_km: 475
    driving_hours: 6
    note: "经布尔津南下，傍晚魔鬼城"

  - day: 7
    from: 乌尔禾
    to: 赛里木湖
    distance_km: 525
    driving_hours: 6
    highway: "奎阿高速 → 连霍高速"
    note: "全程最长行车段，备好零食"

  - day: 8
    from: 赛里木湖
    to: 伊宁
    distance_km: 124
    driving_hours: 2
    highway: "连霍高速"
    note: "上午环湖，途经果子沟大桥"

  - day: 9
    type: rest
    city: 伊宁
    note: "六星街、喀赞其、博物馆"

  - day: 10
    from: 伊宁
    to: 那拉提
    distance_km: 218
    driving_hours: 2.5
    highway: "G218国道"
    note: "伊犁河谷风景优美"

  - day: 11
    from: 那拉提
    to: 巴音布鲁克
    distance_km: 107
    driving_hours: 2
    highway: "G218 → G217独库中段"
    note: "傍晚九曲十八弯落日"

  - day: 12
    from: 巴音布鲁克
    to: 独山子
    distance_km: 271
    driving_hours: 5
    highway: "独库公路北段"
    note: "中国最美公路，实际需5-6h(弯多限速+停车)"

  - day: 13
    from: 独山子
    to: 乌鲁木齐
